name: Build Mac
on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
        working-directory: client/electron
      - name: Build
        run: npx electron-builder --mac --x64 --arm64
        working-directory: client/electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: client/electron/dist/*.dmg
