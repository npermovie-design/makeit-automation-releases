<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>메이킷 로그인</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI",
                   "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 18px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      border: 1px solid #f0f1f4;
    }
    .logo { text-align: center; font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 4px; }
    .sub { text-align: center; font-size: 11px; color: #9ca3af; margin-bottom: 28px; }
    h1 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; color: #111827; }
    .desc { text-align: center; font-size: 12px; color: #6b7280; margin-bottom: 22px; }
    .form-group { margin-top: 12px; }
    label { display: block; font-size: 11px; font-weight: 500; color: #6b7280; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px; background: #fff;
      border: 1px solid #e5e7eb; border-radius: 10px;
      font-size: 13px; font-family: inherit; transition: all 0.15s;
    }
    input:focus { outline: none; border-color: #ef4f5f; box-shadow: 0 0 0 3px #fde7ea; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px;
      background: #ef4f5f; color: #fff;
      font-family: inherit; font-size: 13px; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      margin-top: 16px; transition: background 0.15s;
    }
    .btn:hover { background: #e53947; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-google { background: #fff; color: #111827; border: 1px solid #e5e7eb; }
    .btn-google:hover { background: #f9fafb; border-color: #d1d5db; }
    .g-icon { width: 18px; height: 18px; }
    .divider { display: flex; align-items: center; margin: 18px 0 4px; color: #9ca3af; font-size: 11px; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e5e7eb; }
    .divider span { padding: 0 12px; }
    .error {
      background: #fef2f2; color: #b91c1c;
      padding: 10px 14px; border-radius: 8px;
      font-size: 12px; margin-top: 12px; display: none;
    }
    .error.show { display: block; }
    .pricing {
      text-align: center; margin-top: 20px;
      padding-top: 16px; border-top: 1px solid #f0f1f4;
      font-size: 11px; color: #9ca3af;
    }
    .pricing a { color: #ef4f5f; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">메이킷 SNS 자동화</div>
    <div class="sub">snsmakeit.com</div>
    <h1>로그인</h1>
    <div class="desc">메이킷 계정으로 로그인합니다</div>

    <button type="button" class="btn btn-google" id="googleBtn">
      <svg class="g-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 계속하기
    </button>

    <div class="divider"><span>또는</span></div>

    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="email" placeholder="name@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button type="button" class="btn" id="emailBtn">이메일로 로그인</button>

    <div class="error" id="err"></div>

    <div class="pricing">
      아직 구독 전이면 <a id="pricingLink" href="#">snsmakeit.com/pricing</a>
    </div>
  </div>

  <script>
    // Supabase REST API 직접 호출 (SDK 없음)
    const SUPABASE_URL = "https://ckzjnpzadeovrasucjmu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrempucHphZGVvdnJhc3Vjam11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTA4NTcsImV4cCI6MjA4OTQ4Njg1N30.qgRa-YIm_ttKYTAcFI3xxXAADGPNPUU1bb7EVz_-Ljs";

    console.log("[login] script loaded");
    console.log("[login] window.authBridge:", typeof window.authBridge, window.authBridge);

    const errEl = document.getElementById("err");
    function showError(msg) {
      console.error("[login] ERROR:", msg);
      errEl.textContent = msg;
      errEl.classList.add("show");
    }
    function clearError() { errEl.classList.remove("show"); errEl.textContent = ""; }

    async function loginEmail(email, password) {
      console.log("[login] fetching Supabase auth...");
      const url = `${SUPABASE_URL}/auth/v1/token?grant_type=password`;
      const resp = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify({ email, password }),
      });
      console.log("[login] response status:", resp.status);
      const text = await resp.text();
      console.log("[login] response body:", text.slice(0, 500));
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error("응답 파싱 실패: " + text.slice(0, 200));
      }
      if (!resp.ok) {
        throw new Error(data.error_description || data.msg || data.error || `HTTP ${resp.status}`);
      }
      return data;
    }

    function sendAuthResult(session) {
      if (!window.authBridge) {
        showError("authBridge 연결 실패");
        return;
      }
      window.authBridge.sendResult({
        access_token: session.access_token,
        refresh_token: session.refresh_token || "",
        email: (session.user && session.user.email) || "",
        uid: (session.user && session.user.id) || "",
        expires_at: session.expires_at || 0,
      });
    }

    async function handleEmailClick() {
      console.log("[login] email button clicked");
      clearError();
      const email = document.getElementById("email").value.trim();
      const pw = document.getElementById("pw").value;
      console.log("[login] email:", email, "pw length:", pw.length);
      if (!email || !pw) return showError("이메일과 비밀번호를 입력하세요");

      const btn = document.getElementById("emailBtn");
      btn.disabled = true;
      btn.textContent = "로그인 중...";

      try {
        const session = await loginEmail(email, pw);
        console.log("[login] loginEmail success");
        sendAuthResult(session);
      } catch (e) {
        console.error("[login] loginEmail failed:", e);
        showError(e.message || "로그인 실패");
        btn.disabled = false;
        btn.textContent = "이메일로 로그인";
      }
    }

    function handleGoogleClick() {
      console.log("[login] google button clicked");
      clearError();
      if (window.authBridge) {
        window.authBridge.openGoogleOAuth();
      } else {
        showError("authBridge 연결 실패");
      }
    }

    // addEventListener 사용 (CSP inline-handler 이슈 회피)
    const emailBtnEl = document.getElementById("emailBtn");
    const googleBtnEl = document.getElementById("googleBtn");
    const pricingLinkEl = document.getElementById("pricingLink");
    const pwEl = document.getElementById("pw");
    const emailEl = document.getElementById("email");

    console.log("[login] elements:",
      !!emailBtnEl, !!googleBtnEl, !!pricingLinkEl, !!pwEl, !!emailEl);

    if (emailBtnEl) {
      emailBtnEl.addEventListener("click", handleEmailClick);
      console.log("[login] emailBtn listener attached");
    }
    if (googleBtnEl) {
      googleBtnEl.addEventListener("click", handleGoogleClick);
      console.log("[login] googleBtn listener attached");
    }
    if (pricingLinkEl) {
      pricingLinkEl.addEventListener("click", (e) => {
        e.preventDefault();
        if (window.authBridge) window.authBridge.openExternal("https://snsmakeit.com/pricing");
      });
    }
    if (pwEl) {
      pwEl.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleEmailClick();
      });
    }
    if (emailEl) {
      emailEl.addEventListener("keypress", (e) => {
        if (e.key === "Enter") pwEl && pwEl.focus();
      });
    }

    console.log("[login] handlers registered");

    // 전체 문서 클릭 감지 (어디가 눌리는지 확인)
    document.addEventListener("click", (e) => {
      console.log("[login] DOCUMENT CLICK on:", e.target.tagName, e.target.id || e.target.className);
    }, true);
    console.log("[login] document click listener attached");
  </script>
</body>
</html>
